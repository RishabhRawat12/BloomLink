<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #111827;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            background: #F9FAFB;
            padding: 12px;
            color: #4B5563;
            font-size: 14px;
            border-bottom: 2px solid #E5E7EB;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #E5E7EB;
            font-size: 14px;
            vertical-align: middle;
        }

        .code {
            font-family: monospace;
            font-weight: bold;
            color: var(--primary);
        }

        .url-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-del {
            color: #EF4444;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-del:hover {
            text-decoration: underline;
        }

        .stats-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Link Management</h1>
        <table>
            <thead>
                <tr>
                    <th>Short Code</th>
                    <th>Destination</th>
                    <th>Clicks</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="linkTable"></tbody>
        </table>
        <br>
        <a href="/" style="color: #6B7280; text-decoration: none;">Back to Generator</a>
    </div>

    <script>
        async function loadLinks() {
            try {
                const res = await fetch('/api/links');
                const links = await res.json();
                const table = document.getElementById('linkTable');
                table.innerHTML = links.map(link => `
                    <tr>
                        <td class="code">/${link.short_code}</td>
                        <td class="url-cell" title="${link.long_url}">${link.long_url}</td>
                        <td><strong>${link.clicks || 0}</strong></td>
                        <td>${new Date(link.created_at).toLocaleDateString()}</td>
                        <td>
                            <a href="/analytics/${link.short_code}" class="stats-link">Stats</a> | 
                            <button class="btn-del" onclick="deleteLink('${link.short_code}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to load links:", err);
            }
        }

        async function deleteLink(code) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`/api/links/${code}`, { method: 'DELETE' });
            if (res.ok) {
                loadLinks();
            } else {
                alert("Error deleting link.");
            }
        }

        loadLinks();
    </script>
</body>
</html>
